# Nome da aplicação
spring.application.name=Comercio

spring.datasource.url=jdbc:postgresql://localhost:5432/db_comercio
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
# "update" cria as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta do Servidor (Padrão 8080)
server.port=8080

# Permite que o Jackson processe entidades com Lazy Loading
spring.jackson.serialization.fail-on-empty-beans=false
